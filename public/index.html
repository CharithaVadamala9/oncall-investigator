<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>On-Call Investigator</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f6f8;
    --panel: #ffffff;
    --text: #1a1d21;
    --dim: #6b7280;
    --border: #e2e5e9;
    --accent: #2563eb;
    --error: #b91c1c;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16181d;
      --panel: #1e2127;
      --text: #e6e8eb;
      --dim: #8b929e;
      --border: #2b2f36;
      --accent: #5b9dff;
      --error: #f87171;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  header .status { font-weight: 400; color: var(--dim); font-size: 0.85rem; margin-left: 0.5rem; }
  #transcript {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { border-radius: 8px; padding: 0.6rem 0.8rem; max-width: 100%; }
  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: white;
    white-space: pre-wrap;
  }
  .msg.answer {
    background: var(--panel);
    border: 1px solid var(--border);
    line-height: 1.45;
  }
  .msg.answer h2, .msg.answer h3, .msg.answer h4, .msg.answer h5, .msg.answer h6 {
    margin: 0.7em 0 0.3em;
    font-size: 1.05rem;
  }
  .msg.answer h2:first-child, .msg.answer h3:first-child { margin-top: 0; }
  .msg.answer p { margin: 0 0 0.7em; }
  .msg.answer p:last-child { margin-bottom: 0; }
  .msg.answer ul, .msg.answer ol { margin: 0.2em 0 0.7em; padding-left: 1.3em; }
  .msg.answer li { margin-bottom: 0.25em; }
  .msg.answer code {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    background: rgba(127, 127, 127, 0.18);
    padding: 0.1em 0.35em;
    border-radius: 4px;
    font-size: 0.87em;
  }
  .msg.answer strong { font-weight: 650; }
  .msg.tool {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 0.82rem;
    color: var(--dim);
    padding: 0.2rem 0.8rem;
  }
  .msg.error {
    background: var(--panel);
    border: 1px solid var(--error);
    color: var(--error);
  }
  form {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  input[type="text"] {
    flex: 1;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 0.95rem;
  }
  button {
    padding: 0.6rem 1.1rem;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 0.95rem;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }

  header { display: flex; align-items: center; }
  .header-btn {
    margin-left: auto;
    padding: 0.4rem 0.8rem;
    font-size: 0.82rem;
    font-weight: 500;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
    z-index: 10;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }

  .digest-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(420px, 100%);
    background: var(--bg);
    border-left: 1px solid var(--border);
    box-shadow: -8px 0 24px rgba(0, 0, 0, 0.15);
    transform: translateX(100%);
    transition: transform 0.2s ease;
    z-index: 11;
    display: flex;
    flex-direction: column;
    padding: 1rem;
    overflow-y: auto;
  }
  .digest-panel.open { transform: translateX(0); }
  .digest-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .digest-panel-header h2 { font-size: 1.05rem; margin: 0; }
  .icon-btn {
    background: transparent;
    color: var(--dim);
    border: none;
    padding: 0.2rem 0.5rem;
    font-size: 1.2rem;
    line-height: 1;
  }
  #digestGenerate { align-self: flex-start; margin-bottom: 0.9rem; }
  .digest-current {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 0.85rem;
    font-size: 0.88rem;
    line-height: 1.5;
    margin-bottom: 1.25rem;
  }
  .digest-meta { color: var(--dim); font-size: 0.78rem; margin-bottom: 0.5rem; }
  .digest-loading, .digest-empty { color: var(--dim); font-style: italic; margin: 0; }
  .digest-error { color: var(--error); margin: 0; }
  .digest-panel h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--dim); margin: 0 0 0.5rem; }
  .digest-history { display: flex; flex-direction: column; gap: 0.4rem; }
  .digest-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.7rem;
  }
  .digest-item summary { cursor: pointer; font-size: 0.83rem; color: var(--dim); }
  .digest-item-body { font-size: 0.85rem; line-height: 1.5; margin-top: 0.5rem; }

  .toast {
    position: fixed;
    bottom: 1.25rem;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--text);
    color: var(--bg);
    padding: 0.65rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    max-width: 90vw;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    cursor: pointer;
    transition: transform 0.2s ease;
    z-index: 12;
  }
  .toast.visible { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <header>
    On-Call Investigator
    <span class="status" id="status">connecting…</span>
    <button type="button" id="digestBtn" class="header-btn">Weekly Digest</button>
  </header>
  <div id="transcript"></div>
  <form id="composer">
    <input type="text" id="input" placeholder="Describe the symptom…" autocomplete="off" />
    <button type="submit" id="send">Send</button>
  </form>

  <div class="overlay" id="digestOverlay"></div>
  <aside class="digest-panel" id="digestPanel" aria-label="Weekly digest">
    <div class="digest-panel-header">
      <h2>Weekly Digest</h2>
      <button type="button" id="digestClose" class="icon-btn" aria-label="Close">&times;</button>
    </div>
    <button type="button" id="digestGenerate">Generate Now</button>
    <div id="digestContent" class="digest-current"></div>
    <h3>History</h3>
    <div id="digestHistory" class="digest-history"></div>
  </aside>
  <div class="toast" id="toast"></div>

  <script src="chat.js"></script>
</body>
</html>
